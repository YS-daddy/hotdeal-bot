name: hotdeal-bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: show files
        run: |
          pwd
          ls -la
          echo "================ bot.py ================"
          cat bot.py
          echo "========================================"

      - name: install packages
        run: |
          python --version
          pip install requests beautifulsoup4

      - name: run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python -u bot.py
